<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento Portfolio | Framer Style</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --bg: #000; --card-bg: #111; --text: #fff; --text-muted: #888; --border: rgba(255,255,255,0.08); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { flex-direction: column; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 200px); gap: 1.5rem; max-width: 900px; width: 100%; }
.bento-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 2.5rem; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; position: relative; }
.bento-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.15); }
.card-large { grid-column: span 2; grid-row: span 2; background: radial-gradient(circle at top left, #1a1a1a, #0a0a0a); }
.card-medium { grid-column: span 1; grid-row: span 1; }
h1 { font-size: 2.5rem; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 1rem; }
p { color: var(--text-muted); font-size: 1rem; line-height: 1.6; }
.icon { width: 44px; height: 44px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; font-size: 1.2rem; }
@media (max-width: 768px) { .bento-grid { grid-template-columns: 1fr; grid-template-rows: auto; } .card-large { grid-column: span 1; } }
.top-nav { display:flex; justify-content:space-between; align-items:center; width:100%; max-width:900px; margin:0 auto 2rem; } .top-nav a { color:var(--text); text-decoration:none; font-weight:500; margin-left:1.5rem; transition:color 0.2s; } .top-nav a:hover { color:var(--text-muted); } </style>
</head>
<body>
<nav class="top-nav"><a href="index.html" style="font-weight:600; font-size:1.25rem; color:white; text-decoration:none;">Bento.</a><div><a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a><a href="contact.html">Contact</a></div></nav>
<div class="bento-grid">
    <div class="bento-card card-large">
        <div>
            <h1>Hi, I'm Kotao.</h1>
            <p>A passionate creator crafting digital experiences. I specialize in minimal, high-performance web applications with a strong focus on aesthetics and user experience.</p>
        </div>
        <div style="display:flex; gap:1rem; margin-top:2rem;">
            <button style="padding:1rem 2rem; border-radius:99px; border:none; background:#fff; color:#000; font-weight:600; cursor:pointer; font-family:'Inter'; transition:transform 0.2s;">Contact Me</button>
        </div>
    </div>
    <div class="bento-card card-medium">
        <div class="icon">捗</div>
        <h3 style="margin-bottom:0.5rem; font-weight:500; letter-spacing:-0.02em;">Projects</h3>
        <p style="font-size:0.9rem;">Explore my latest work.</p>
    </div>
    <div class="bento-card card-medium" style="background: linear-gradient(135deg, #3b82f6, #8b5cf6);">
        <h3 style="margin-bottom:0.5rem; font-weight:500; color:#fff; letter-spacing:-0.02em;">Socials</h3>
        <p style="color:rgba(255,255,255,0.8); font-size:0.9rem;">Connect with me.</p>
    </div>
</div>
</body>
</html>
